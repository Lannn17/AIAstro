services:
  # ── Single service: Docker builds frontend + runs FastAPI ──────────────
  - type: web
    name: aieastro
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
